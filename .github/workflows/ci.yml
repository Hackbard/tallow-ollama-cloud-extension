name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run tests
        run: bun test extensions/ollama-cloud/__tests__/ollama-cloud.test.ts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Typecheck
        run: bunx tsc --noEmit extensions/ollama-cloud/index.ts

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run tests with coverage
        run: |
          bun test --coverage extensions/ollama-cloud/__tests__/ollama-cloud.test.ts 2>&1 | tee coverage.txt
      - name: Extract coverage percentage
        id: extract
        run: |
          COVERAGE=$(grep -oP '\d+\.?\d*%' coverage.txt | tail -1 | sed 's/%//')
          if [ -z "$COVERAGE" ]; then COVERAGE="0"; fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Extracted coverage: $COVERAGE%"
      - name: Generate coverage badge JSON
        run: |
          mkdir -p badges
          COV="${{ steps.extract.outputs.coverage }}"
          COLOR="red"
          if (( $(echo "$COV >= 80" | bc -l) )); then COLOR="brightgreen"; fi
          if (( $(echo "$COV >= 60" | bc -l) )) && (( $(echo "$COV < 80" | bc -l) )); then COLOR="yellow"; fi
          if (( $(echo "$COV >= 40" | bc -l) )) && (( $(echo "$COV < 60" | bc -l) )); then COLOR="orange"; fi
          if (( $(echo "$COV >= 20" | bc -l) )) && (( $(echo "$COV < 40" | bc -l) )); then COLOR="red"; fi
          cat > badges/coverage-badge.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${COV}%",
            "color": "${COLOR}",
            "namedLogo": "bun"
          }
          EOF
      - name: Commit coverage badge
        uses: stefanzweifel/git-auto-commit-action@v5
        if: github.ref == 'refs/heads/main'
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: "badges/coverage-badge.json"
